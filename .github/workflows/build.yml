name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          python3-pip autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          android-sdk-build-tools \
          cmake libffi-dev libssl-dev \
          python3-dev python3-setuptools
    
    - name: Install Buildozer
      run: |
        pip3 install --upgrade pip
        pip3 install buildozer cython==0.29.19
    
    - name: Build APK
      run: |
        cd ${{ github.workspace }}
        buildozer -v android debug 2>&1 | tee buildozer_output.txt
      env:
        BUILDOZER_WARN_ON_ROOT: 1
    
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: worldcup2026-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Show build output on failure
      if: failure()
      run: |
        cat buildozer_output.txt || true

