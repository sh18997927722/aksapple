name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk-headless \
          python3-pip autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev \
          python3-dev python3-setuptools
    
    - name: Install Buildozer
      run: |
        pip3 install --upgrade pip
        pip3 install buildozer cython==0.29.19

    - name: Setup Android SDK (build-tools for aidl)
      run: |
        mkdir -p $HOME/android-sdk
        cd /tmp
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdtools.zip
        unzip -q cmdtools.zip
        mkdir -p $HOME/android-sdk/cmdline-tools
        mv cmdline-tools $HOME/android-sdk/cmdline-tools/latest
        export ANDROID_SDK_ROOT=$HOME/android-sdk
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "build-tools;33.0.0" "platforms;android-33"
        mkdir -p $HOME/.buildozer/android/platform 2>/dev/null || true
        ln -sf $ANDROID_SDK_ROOT $HOME/.buildozer/android/platform/android-sdk || true
    
    - name: Build APK
      run: |
        export ANDROID_SDK_ROOT=$HOME/android-sdk
        export PATH=$HOME/android-sdk/build-tools/33.0.0:$PATH
        cd ${{ github.workspace }}
        buildozer -v android debug 2>&1 | tee buildozer_output.txt
      env:
        BUILDOZER_WARN_ON_ROOT: 1
    
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: worldcup2026-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Show build output on failure
      if: failure()
      run: |
        cat buildozer_output.txt || true
